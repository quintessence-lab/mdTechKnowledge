<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RNNの固定長ボトルネック問題</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --bg2: #161820;
    --bg3: #1e2028;
    --text: #e8e6de;
    --text2: #9e9b91;
    --purple: #8b7ff0;
    --teal: #3ecfa0;
    --amber: #f0b429;
    --blue: #4fa8e8;
    --red: #f06b6b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
  }
  h2 {
    text-align: center;
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text2);
    margin-bottom: 28px;
  }
  .diagram-wrapper {
    width: 100%;
    overflow-x: auto;
    padding-bottom: 12px;
  }
  @media (max-width: 768px) {
    body { padding: 16px 8px; }
    h2 { font-size: 1.05rem; }
  }
</style>
</head>
<body>
<h2>Encoder-Decoderの固定長ボトルネック問題</h2>
<p class="subtitle">長い入力文も1つの固定長ベクトルに圧縮される</p>
<div class="diagram-wrapper">
<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" style="min-width:650px;max-width:900px;width:100%;height:auto;display:block;margin:0 auto;">
  <defs>
    <marker id="arrTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3ecfa0"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f06b6b"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b7ff0"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4fa8e8"/>
    </marker>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Funnel gradient -->
    <linearGradient id="funnelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3ecfa0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f06b6b" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Section labels -->
  <text x="175" y="36" text-anchor="middle" fill="#3ecfa0" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700">Encoder</text>
  <text x="450" y="36" text-anchor="middle" fill="#f06b6b" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700">固定長ベクトル</text>
  <text x="725" y="36" text-anchor="middle" fill="#8b7ff0" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700">Decoder</text>

  <!-- ===== ENCODER (left side) ===== -->
  <!-- Long input sentence words -->
  <g fill="#4fa8e8" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">
    <text x="55"  y="375">私</text>
    <text x="95"  y="375">は</text>
    <text x="135" y="375">昨日</text>
    <text x="175" y="375">東京</text>
    <text x="215" y="375">で</text>
    <text x="255" y="375">友人</text>
    <text x="295" y="375">と</text>
  </g>
  <text x="175" y="400" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP', sans-serif" font-size="10">入力文（7トークン）</text>

  <!-- Encoder RNN cells -->
  <g>
    <rect x="35"  y="275" width="46" height="40" rx="6" fill="#1e2028" stroke="#3ecfa0" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="91"  y="275" width="46" height="40" rx="6" fill="#1e2028" stroke="#3ecfa0" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="147" y="275" width="46" height="40" rx="6" fill="#1e2028" stroke="#3ecfa0" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="203" y="275" width="46" height="40" rx="6" fill="#1e2028" stroke="#3ecfa0" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="259" y="275" width="46" height="40" rx="6" fill="#1e2028" stroke="#3ecfa0" stroke-width="1.2" stroke-opacity="0.5"/>
  </g>
  <!-- Dots for more cells -->
  <text x="328" y="300" fill="#9e9b91" font-family="'JetBrains Mono', monospace" font-size="16">···</text>

  <!-- Cell labels -->
  <g fill="#3ecfa0" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle" opacity="0.8">
    <text x="58"  y="299">RNN</text>
    <text x="114" y="299">RNN</text>
    <text x="170" y="299">RNN</text>
    <text x="226" y="299">RNN</text>
    <text x="282" y="299">RNN</text>
  </g>

  <!-- Input arrows -->
  <g>
    <line x1="58"  y1="360" x2="58"  y2="320" stroke="#4fa8e8" stroke-width="1.2" marker-end="url(#arrBlue)"/>
    <line x1="114" y1="360" x2="114" y2="320" stroke="#4fa8e8" stroke-width="1.2" marker-end="url(#arrBlue)"/>
    <line x1="170" y1="360" x2="170" y2="320" stroke="#4fa8e8" stroke-width="1.2" marker-end="url(#arrBlue)"/>
    <line x1="226" y1="360" x2="226" y2="320" stroke="#4fa8e8" stroke-width="1.2" marker-end="url(#arrBlue)"/>
    <line x1="282" y1="360" x2="282" y2="320" stroke="#4fa8e8" stroke-width="1.2" marker-end="url(#arrBlue)"/>
  </g>

  <!-- Hidden state arrows -->
  <g>
    <line x1="85"  y1="295" x2="87" y2="295" stroke="#3ecfa0" stroke-width="1.5" marker-end="url(#arrTeal)"/>
    <line x1="141" y1="295" x2="143" y2="295" stroke="#3ecfa0" stroke-width="1.5" marker-end="url(#arrTeal)"/>
    <line x1="197" y1="295" x2="199" y2="295" stroke="#3ecfa0" stroke-width="1.5" marker-end="url(#arrTeal)"/>
    <line x1="253" y1="295" x2="255" y2="295" stroke="#3ecfa0" stroke-width="1.5" marker-end="url(#arrTeal)"/>
  </g>

  <!-- ===== FUNNEL / COMPRESSION VISUAL ===== -->
  <!-- Funnel shape showing compression -->
  <path d="M 310,260 L 390,185 L 510,185 L 510,215 L 390,215 L 310,300 Z" fill="url(#funnelGrad)" stroke="none" opacity="0.4"/>

  <!-- Compression arrows from encoder to bottleneck -->
  <path d="M 305,275 C 340,260 370,210 410,200" stroke="#3ecfa0" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arrTeal)"/>
  <path d="M 305,295 C 340,290 380,230 410,200" stroke="#3ecfa0" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arrTeal)"/>
  <path d="M 305,310 C 350,310 390,250 410,200" stroke="#3ecfa0" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.4" marker-end="url(#arrTeal)"/>

  <!-- ===== BOTTLENECK (center) ===== -->
  <g filter="url(#redGlow)">
    <rect x="410" y="170" width="80" height="60" rx="10" fill="#1e2028" stroke="#f06b6b" stroke-width="2.5"/>
  </g>
  <text x="450" y="196" text-anchor="middle" fill="#f06b6b" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="500">Context</text>
  <text x="450" y="212" text-anchor="middle" fill="#f06b6b" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="500">Vector</text>

  <!-- Bottleneck warning -->
  <rect x="403" y="130" width="94" height="28" rx="6" fill="#f06b6b" fill-opacity="0.15" stroke="#f06b6b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="450" y="149" text-anchor="middle" fill="#f06b6b" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="700">ボトルネック</text>

  <!-- Size comparison annotation -->
  <g>
    <!-- Big bracket for input -->
    <line x1="35" y1="255" x2="305" y2="255" stroke="#9e9b91" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
    <text x="170" y="248" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP', sans-serif" font-size="9" opacity="0.6">大量の情報</text>

    <!-- Small bracket for vector -->
    <line x1="420" y1="242" x2="480" y2="242" stroke="#f06b6b" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
    <text x="450" y="254" text-anchor="middle" fill="#f06b6b" font-family="'Noto Sans JP', sans-serif" font-size="9" opacity="0.8">固定サイズ</text>
  </g>

  <!-- ===== DECODER (right side) ===== -->
  <!-- Expansion arrows from bottleneck to decoder -->
  <path d="M 490,185 C 520,175 560,160 590,160" stroke="#8b7ff0" stroke-width="1.5" fill="none" marker-end="url(#arrPurple)" opacity="0.6"/>
  <path d="M 490,200 C 530,200 560,200 590,200" stroke="#8b7ff0" stroke-width="1.5" fill="none" marker-end="url(#arrPurple)" opacity="0.6"/>
  <path d="M 490,215 C 520,225 560,240 590,240" stroke="#8b7ff0" stroke-width="1.5" fill="none" marker-end="url(#arrPurple)" opacity="0.6"/>

  <!-- Decoder RNN cells -->
  <g>
    <rect x="597" y="140" width="46" height="40" rx="6" fill="#1e2028" stroke="#8b7ff0" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="653" y="140" width="46" height="40" rx="6" fill="#1e2028" stroke="#8b7ff0" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="709" y="140" width="46" height="40" rx="6" fill="#1e2028" stroke="#8b7ff0" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="765" y="140" width="46" height="40" rx="6" fill="#1e2028" stroke="#8b7ff0" stroke-width="1.2" stroke-opacity="0.5"/>
    <rect x="821" y="140" width="46" height="40" rx="6" fill="#1e2028" stroke="#8b7ff0" stroke-width="1.2" stroke-opacity="0.5"/>
  </g>

  <!-- Decoder cell labels -->
  <g fill="#8b7ff0" font-family="'JetBrains Mono', monospace" font-size="9" text-anchor="middle" opacity="0.8">
    <text x="620" y="164">RNN</text>
    <text x="676" y="164">RNN</text>
    <text x="732" y="164">RNN</text>
    <text x="788" y="164">RNN</text>
    <text x="844" y="164">RNN</text>
  </g>

  <!-- Decoder hidden state arrows -->
  <g>
    <line x1="647" y1="160" x2="649" y2="160" stroke="#8b7ff0" stroke-width="1.5" marker-end="url(#arrPurple)"/>
    <line x1="703" y1="160" x2="705" y2="160" stroke="#8b7ff0" stroke-width="1.5" marker-end="url(#arrPurple)"/>
    <line x1="759" y1="160" x2="761" y2="160" stroke="#8b7ff0" stroke-width="1.5" marker-end="url(#arrPurple)"/>
    <line x1="815" y1="160" x2="817" y2="160" stroke="#8b7ff0" stroke-width="1.5" marker-end="url(#arrPurple)"/>
  </g>

  <!-- Decoder output arrows -->
  <g>
    <line x1="620" y1="135" x2="620" y2="105" stroke="#8b7ff0" stroke-width="1.2" marker-end="url(#arrPurple)" opacity="0.7"/>
    <line x1="676" y1="135" x2="676" y2="105" stroke="#8b7ff0" stroke-width="1.2" marker-end="url(#arrPurple)" opacity="0.7"/>
    <line x1="732" y1="135" x2="732" y2="105" stroke="#8b7ff0" stroke-width="1.2" marker-end="url(#arrPurple)" opacity="0.7"/>
    <line x1="788" y1="135" x2="788" y2="105" stroke="#8b7ff0" stroke-width="1.2" marker-end="url(#arrPurple)" opacity="0.7"/>
    <line x1="844" y1="135" x2="844" y2="105" stroke="#8b7ff0" stroke-width="1.2" marker-end="url(#arrPurple)" opacity="0.7"/>
  </g>

  <!-- Decoder output words -->
  <g fill="#e8e6de" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle">
    <text x="620" y="95">I</text>
    <text x="676" y="95">met</text>
    <text x="732" y="95">a</text>
    <text x="788" y="95">friend</text>
    <text x="844" y="95">...</text>
  </g>
  <text x="732" y="78" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP', sans-serif" font-size="10">出力文</text>

  <!-- ===== Problem annotation ===== -->
  <rect x="340" y="340" width="220" height="60" rx="8" fill="#1e2028" stroke="#f06b6b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="450" y="362" text-anchor="middle" fill="#f06b6b" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="500">問題: 入力文が長くなるほど</text>
  <text x="450" y="380" text-anchor="middle" fill="#f06b6b" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="500">情報の損失が大きくなる</text>
  <text x="450" y="395" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP', sans-serif" font-size="9">→ Attention機構で解決</text>
</svg>
</div>
</body>
</html>
