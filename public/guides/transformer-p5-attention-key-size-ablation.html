<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>d_k のサイズによる性能変化</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --bg2: #161820;
    --bg3: #1e2028;
    --text: #e8e6de;
    --text2: #9e9b91;
    --purple: #8b7ff0;
    --teal: #3ecfa0;
    --amber: #f0b429;
    --blue: #4fa8e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    margin: 0; padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
  }
  h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
  .subtitle {
    font-size: 0.85rem; color: var(--text2);
    margin-bottom: 20px; line-height: 1.6;
  }
  .chart-container {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
  }
  svg text {
    font-family: 'Noto Sans JP', sans-serif;
  }
  svg .mono {
    font-family: 'JetBrains Mono', monospace;
  }
  .annotation-box {
    max-width: 560px;
    margin: 16px auto 0;
    background: var(--bg2);
    border: 1px solid #2a2c36;
    border-left: 3px solid var(--amber);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: var(--text2);
    line-height: 1.7;
  }
  .annotation-box strong {
    color: var(--amber);
  }
</style>
</head>
<body>
<h2>d<sub>k</sub> のサイズによる性能変化（Ablation Study）</h2>
<p class="subtitle">Keyの次元数が小さすぎるとAttentionの識別力が低下し、翻訳品質に影響する</p>

<div class="chart-container">
  <svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="480" height="320" fill="var(--bg)" rx="8"/>

    <!-- Chart area -->
    <g transform="translate(80, 30)">
      <!-- Y axis grid lines and labels -->
      <line x1="0" y1="0" x2="340" y2="0" stroke="#2a2c36" stroke-dasharray="3,3"/>
      <text x="-10" y="5" fill="#9e9b91" font-size="11" text-anchor="end" class="mono">26.0</text>

      <line x1="0" y1="50" x2="340" y2="50" stroke="#2a2c36" stroke-dasharray="3,3"/>
      <text x="-10" y="55" fill="#9e9b91" font-size="11" text-anchor="end" class="mono">25.8</text>

      <line x1="0" y1="100" x2="340" y2="100" stroke="#2a2c36" stroke-dasharray="3,3"/>
      <text x="-10" y="105" fill="#9e9b91" font-size="11" text-anchor="end" class="mono">25.6</text>

      <line x1="0" y1="150" x2="340" y2="150" stroke="#2a2c36" stroke-dasharray="3,3"/>
      <text x="-10" y="155" fill="#9e9b91" font-size="11" text-anchor="end" class="mono">25.4</text>

      <line x1="0" y1="200" x2="340" y2="200" stroke="#2a2c36" stroke-dasharray="3,3"/>
      <text x="-10" y="205" fill="#9e9b91" font-size="11" text-anchor="end" class="mono">25.2</text>

      <line x1="0" y1="250" x2="340" y2="250" stroke="#2a2c36"/>
      <text x="-10" y="255" fill="#9e9b91" font-size="11" text-anchor="end" class="mono">25.0</text>

      <!-- Y axis label -->
      <text x="-55" y="125" fill="#e8e6de" font-size="12" text-anchor="middle" transform="rotate(-90,-55,125)">BLEU スコア</text>

      <!-- Bars -->
      <!-- d_k=16: BLEU=25.5 → height = (25.5-25.0)/(26.0-25.0)*250 = 125 -->
      <rect x="30" y="125" width="70" height="125" fill="var(--amber)" rx="4" opacity="0.85"/>
      <text x="65" y="115" fill="var(--amber)" font-size="13" font-weight="700" text-anchor="middle" class="mono">25.5</text>
      <text x="65" y="275" fill="#e8e6de" font-size="12" text-anchor="middle">d<tspan font-size="9" dy="3">k</tspan><tspan dy="-3">=16</tspan></text>

      <!-- d_k=32: BLEU=25.8 → height = (25.8-25.0)/(26.0-25.0)*250 = 200 -->
      <rect x="140" y="50" width="70" height="200" fill="var(--blue)" rx="4" opacity="0.85"/>
      <text x="175" y="40" fill="var(--blue)" font-size="13" font-weight="700" text-anchor="middle" class="mono">25.8</text>
      <text x="175" y="275" fill="#e8e6de" font-size="12" text-anchor="middle">d<tspan font-size="9" dy="3">k</tspan><tspan dy="-3">=32</tspan></text>

      <!-- d_k=64: BLEU=25.8 → height = 200 -->
      <rect x="250" y="50" width="70" height="200" fill="var(--teal)" rx="4" opacity="0.85"/>
      <text x="285" y="40" fill="var(--teal)" font-size="13" font-weight="700" text-anchor="middle" class="mono">25.8</text>
      <text x="285" y="275" fill="#e8e6de" font-size="12" text-anchor="middle">d<tspan font-size="9" dy="3">k</tspan><tspan dy="-3">=64</tspan></text>

      <!-- Base label -->
      <rect x="258" y="16" width="54" height="18" fill="var(--bg3)" rx="3"/>
      <text x="285" y="29" fill="var(--teal)" font-size="10" text-anchor="middle" font-weight="500">Base</text>

      <!-- Drop arrow annotation -->
      <line x1="65" y1="130" x2="65" y2="55" stroke="var(--amber)" stroke-dasharray="4,3" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
      <text x="68" y="95" fill="var(--amber)" font-size="9.5" opacity="0.9">-0.3 低下</text>

      <defs>
        <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="var(--amber)"/>
        </marker>
      </defs>
    </g>
  </svg>
</div>

<div class="annotation-box">
  <strong>d<sub>k</sub>=16 で性能が低下する理由:</strong><br>
  Dot-Productの空間が狭すぎて、異なるトークン間の類似度を十分に区別できない（識別力が不足）。Key/Queryベクトルの次元が小さいと、Attentionの重みが均一化し、重要な位置への集中が弱まる。
</div>

</body>
</html>
