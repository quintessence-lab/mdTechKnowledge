<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EncoderからDecoderへのCross-Attentionのデータフロー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11; --bg2: #161820; --bg3: #1e2028;
    --text: #e8e6de; --text2: #9e9b91;
    --purple: #8b7ff0; --teal: #3ecfa0; --amber: #f0b429; --blue: #4fa8e8;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; padding: 24px; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; }
  h1 { font-size: clamp(1rem, 2.5vw, 1.35rem); text-align: center; margin: 0 0 16px; font-weight: 700; }
  .svg-wrap { width: 100%; max-width: 780px; margin: 0 auto; }
  svg { display: block; width: 100%; height: auto; }
  .legend { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: .8rem; color: var(--text2); }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
</style>
</head>
<body>
<h1>EncoderからDecoderへのCross-Attentionのデータフロー</h1>

<div class="svg-wrap">
<svg viewBox="0 0 780 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="aP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#8b7ff0"/></marker>
    <marker id="aT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#3ecfa0"/></marker>
    <marker id="aG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#9e9b91"/></marker>
    <marker id="aA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0b429"/></marker>
  </defs>

  <!-- === ENCODER側 === -->
  <text x="130" y="30" text-anchor="middle" fill="#4fa8e8" font-family="'Noto Sans JP',sans-serif" font-size="16" font-weight="700">Encoder</text>

  <!-- Encoder入力 -->
  <rect x="50" y="42" width="160" height="34" rx="6" fill="#1a2030" stroke="#4fa8e8" stroke-width="1.2"/>
  <text x="130" y="64" text-anchor="middle" fill="#4fa8e8" font-family="'Noto Sans JP',sans-serif" font-size="12">入力埋め込み</text>

  <!-- Encoder Layer 1 -->
  <rect x="50" y="90" width="160" height="56" rx="8" fill="#1a2030" stroke="#4fa8e8" stroke-width="1.5"/>
  <text x="130" y="112" text-anchor="middle" fill="#e8e6de" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="500">Self-Attention</text>
  <text x="130" y="130" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">+ FFN</text>
  <text x="218" y="122" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">層 1</text>

  <!-- Encoder Layer 2..5 (省略表現) -->
  <rect x="50" y="158" width="160" height="34" rx="8" fill="#1a2030" stroke="#4fa8e8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="180" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="11">… 層 2〜5 …</text>

  <!-- Encoder Layer 6 -->
  <rect x="50" y="204" width="160" height="56" rx="8" fill="#1a2030" stroke="#4fa8e8" stroke-width="1.5"/>
  <text x="130" y="226" text-anchor="middle" fill="#e8e6de" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="500">Self-Attention</text>
  <text x="130" y="244" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">+ FFN</text>
  <text x="218" y="236" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">層 6</text>

  <!-- Encoder最終出力ボックス -->
  <rect x="40" y="278" width="180" height="40" rx="8" fill="#1a3025" stroke="#3ecfa0" stroke-width="2"/>
  <text x="130" y="303" text-anchor="middle" fill="#3ecfa0" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700">Encoder最終出力</text>

  <!-- 矢印: 入力→L1 -->
  <line x1="130" y1="76" x2="130" y2="90" stroke="#9e9b91" stroke-width="1.5" marker-end="url(#aG)"/>
  <!-- 矢印: L1→省略 -->
  <line x1="130" y1="146" x2="130" y2="158" stroke="#9e9b91" stroke-width="1.5" marker-end="url(#aG)"/>
  <!-- 矢印: 省略→L6 -->
  <line x1="130" y1="192" x2="130" y2="204" stroke="#9e9b91" stroke-width="1.5" marker-end="url(#aG)"/>
  <!-- 矢印: L6→最終出力 -->
  <line x1="130" y1="260" x2="130" y2="278" stroke="#3ecfa0" stroke-width="2" marker-end="url(#aT)"/>

  <!-- === DECODER側 === -->
  <text x="570" y="30" text-anchor="middle" fill="#8b7ff0" font-family="'Noto Sans JP',sans-serif" font-size="16" font-weight="700">Decoder</text>

  <!-- Decoder入力 -->
  <rect x="490" y="42" width="160" height="34" rx="6" fill="#201a30" stroke="#8b7ff0" stroke-width="1.2"/>
  <text x="570" y="64" text-anchor="middle" fill="#c4b8ff" font-family="'Noto Sans JP',sans-serif" font-size="12">出力埋め込み（シフト）</text>

  <!-- Decoder Layer 1 -->
  <rect x="480" y="90" width="180" height="110" rx="8" fill="#201a30" stroke="#8b7ff0" stroke-width="1.5"/>
  <text x="570" y="112" text-anchor="middle" fill="#c4b8ff" font-family="'Noto Sans JP',sans-serif" font-size="11">Masked Self-Attention</text>
  <line x1="495" y1="120" x2="645" y2="120" stroke="#333" stroke-width="0.8"/>
  <rect x="496" y="126" width="148" height="34" rx="5" fill="#1a2a25" stroke="#f0b429" stroke-width="1.5"/>
  <text x="570" y="148" text-anchor="middle" fill="#f0b429" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700">Cross-Attention</text>
  <line x1="495" y1="166" x2="645" y2="166" stroke="#333" stroke-width="0.8"/>
  <text x="570" y="186" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">FFN</text>
  <text x="668" y="148" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">層 1</text>

  <!-- Decoder Layer 2..5 -->
  <rect x="480" y="212" width="180" height="34" rx="8" fill="#201a30" stroke="#8b7ff0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="570" y="234" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="11">… 層 2〜5 …</text>

  <!-- Decoder Layer 6 -->
  <rect x="480" y="258" width="180" height="110" rx="8" fill="#201a30" stroke="#8b7ff0" stroke-width="1.5"/>
  <text x="570" y="280" text-anchor="middle" fill="#c4b8ff" font-family="'Noto Sans JP',sans-serif" font-size="11">Masked Self-Attention</text>
  <line x1="495" y1="288" x2="645" y2="288" stroke="#333" stroke-width="0.8"/>
  <rect x="496" y="294" width="148" height="34" rx="5" fill="#1a2a25" stroke="#f0b429" stroke-width="1.5"/>
  <text x="570" y="316" text-anchor="middle" fill="#f0b429" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700">Cross-Attention</text>
  <line x1="495" y1="334" x2="645" y2="334" stroke="#333" stroke-width="0.8"/>
  <text x="570" y="354" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">FFN</text>
  <text x="668" y="316" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">層 6</text>

  <!-- Decoder出力 -->
  <rect x="490" y="384" width="160" height="34" rx="6" fill="#201a30" stroke="#8b7ff0" stroke-width="1.2"/>
  <text x="570" y="406" text-anchor="middle" fill="#c4b8ff" font-family="'Noto Sans JP',sans-serif" font-size="12">出力確率分布</text>

  <!-- 矢印: 入力→L1 -->
  <line x1="570" y1="76" x2="570" y2="90" stroke="#9e9b91" stroke-width="1.5" marker-end="url(#aG)"/>
  <!-- 矢印: L1→省略 -->
  <line x1="570" y1="200" x2="570" y2="212" stroke="#9e9b91" stroke-width="1.5" marker-end="url(#aG)"/>
  <!-- 矢印: 省略→L6 -->
  <line x1="570" y1="246" x2="570" y2="258" stroke="#9e9b91" stroke-width="1.5" marker-end="url(#aG)"/>
  <!-- 矢印: L6→出力 -->
  <line x1="570" y1="368" x2="570" y2="384" stroke="#9e9b91" stroke-width="1.5" marker-end="url(#aG)"/>

  <!-- === Cross-Attention矢印: Encoder最終出力 → 各DecoderのCross-Attention === -->
  <!-- → Decoder L1 Cross-Attention -->
  <path d="M220,298 C320,298 340,143 496,143" fill="none" stroke="#f0b429" stroke-width="2.2" marker-end="url(#aA)"/>
  <!-- → Decoder L6 Cross-Attention (省略の途中も供給されることを示す)-->
  <path d="M220,298 C350,298 370,230 480,230" fill="none" stroke="#f0b429" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aA)"/>
  <!-- → Decoder L6 Cross-Attention -->
  <path d="M220,298 C320,310 380,311 496,311" fill="none" stroke="#f0b429" stroke-width="2.2" marker-end="url(#aA)"/>

  <!-- K,V ラベル（Encoder側）-->
  <rect x="260" y="330" width="200" height="50" rx="6" fill="#2a2820" stroke="#f0b429" stroke-width="1" opacity="0.9"/>
  <text x="360" y="350" text-anchor="middle" fill="#f0b429" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700">K, V: エンコーダの出力</text>
  <text x="360" y="370" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">（何を持っているか）</text>

  <!-- Q ラベル（Decoder側）-->
  <rect x="400" y="432" width="200" height="50" rx="6" fill="#2d2040" stroke="#8b7ff0" stroke-width="1" opacity="0.9"/>
  <text x="500" y="452" text-anchor="middle" fill="#c4b8ff" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="700">Q: デコーダの状態</text>
  <text x="500" y="472" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">（何を探しているか）</text>

  <!-- 補足注釈 -->
  <text x="390" y="510" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="11">※ Encoderの最終出力が、Decoderの全層のCross-Attentionに供給される</text>
</svg>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4fa8e8"></div>Encoder</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8b7ff0"></div>Decoder</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f0b429"></div>Cross-Attention接続</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3ecfa0"></div>Encoder最終出力</div>
</div>
</body>
</html>
