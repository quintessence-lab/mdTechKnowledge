<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decoder 6層スタック構造</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --bg2: #161820;
    --bg3: #1e2028;
    --text: #e8e6de;
    --text2: #9e9b91;
    --purple: #8b7ff0;
    --teal: #3ecfa0;
    --amber: #f0b429;
    --blue: #4fa8e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    margin: 0; padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
  }
  h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
  .subtitle {
    font-size: 0.85rem; color: var(--text2);
    margin-bottom: 16px; line-height: 1.6;
  }
  .diagram-wrap {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }
  svg text { font-family: 'Noto Sans JP', sans-serif; }
  svg .mono { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<h2>Decoder 6層のスタック構造</h2>
<p class="subtitle">各層は Masked Self-Attention, Cross-Attention, Feed-Forward の3つのサブレイヤーで構成されます。Encoder出力が各層の Cross-Attention に供給されます。</p>

<div class="diagram-wrap">
<svg viewBox="0 0 460 900" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
  <defs>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#9e9b91"/>
    </marker>
    <marker id="ah-p" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#8b7ff0"/>
    </marker>
  </defs>

  <!-- Output Embedding + Positional Encoding at bottom -->
  <rect x="120" y="850" width="220" height="28" rx="6" fill="#1e2028" stroke="#4fa8e8" stroke-width="1.2"/>
  <text x="230" y="869" text-anchor="middle" fill="#4fa8e8" font-size="11" font-weight="500">出力埋め込み（右シフト）</text>

  <rect x="120" y="810" width="220" height="28" rx="6" fill="#1e2028" stroke="#f0b429" stroke-width="1.2"/>
  <text x="230" y="829" text-anchor="middle" fill="#f0b429" font-size="11" font-weight="500">位置エンコーディング</text>

  <line x1="230" y1="850" x2="230" y2="840" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="230" y1="810" x2="230" y2="800" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Encoder output label (left side) -->
  <rect x="10" y="440" width="60" height="100" rx="6" fill="#1e2028" stroke="#8b7ff0" stroke-width="1.2"/>
  <text x="40" y="476" text-anchor="middle" fill="#8b7ff0" font-size="9.5" font-weight="600">Encoder</text>
  <text x="40" y="492" text-anchor="middle" fill="#8b7ff0" font-size="9.5" font-weight="600">出力</text>
  <text x="40" y="516" text-anchor="middle" fill="#9e9b91" font-size="8">(K, V)</text>

  <!-- 6 Decoder Layers -->
  <!-- Each layer height: ~105, with 3 sub-layers -->
  <!-- Layer 1 (bottom) at y=680, Layer 6 (top) at y=155 -->

  <g transform="translate(0, 685)">
    <rect x="85" y="0" width="290" height="105" rx="8" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.4"/>
    <text x="93" y="16" fill="#f0b429" font-size="10" font-weight="700" class="mono">Layer 1</text>
    <rect x="100" y="70" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="88" text-anchor="middle" fill="#8b7ff0" font-size="10">Masked Multi-Head Self-Attention</text>
    <rect x="100" y="40" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="58" text-anchor="middle" fill="#8b7ff0" font-size="10">Multi-Head Cross-Attention</text>
    <rect x="100" y="10" width="260" height="26" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
    <text x="230" y="28" text-anchor="middle" fill="#f0b429" font-size="10">Feed-Forward Network</text>
    <!-- Encoder arrow to cross-attention -->
    <line x1="72" y1="53" x2="98" y2="53" stroke="#8b7ff0" stroke-width="1" marker-end="url(#ah-p)"/>
  </g>

  <g transform="translate(0, 575)">
    <rect x="85" y="0" width="290" height="105" rx="8" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.4"/>
    <text x="93" y="16" fill="#f0b429" font-size="10" font-weight="700" class="mono">Layer 2</text>
    <rect x="100" y="70" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="88" text-anchor="middle" fill="#8b7ff0" font-size="10">Masked Multi-Head Self-Attention</text>
    <rect x="100" y="40" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="58" text-anchor="middle" fill="#8b7ff0" font-size="10">Multi-Head Cross-Attention</text>
    <rect x="100" y="10" width="260" height="26" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
    <text x="230" y="28" text-anchor="middle" fill="#f0b429" font-size="10">Feed-Forward Network</text>
    <line x1="72" y1="53" x2="98" y2="53" stroke="#8b7ff0" stroke-width="1" marker-end="url(#ah-p)"/>
  </g>

  <g transform="translate(0, 465)">
    <rect x="85" y="0" width="290" height="105" rx="8" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.4"/>
    <text x="93" y="16" fill="#f0b429" font-size="10" font-weight="700" class="mono">Layer 3</text>
    <rect x="100" y="70" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="88" text-anchor="middle" fill="#8b7ff0" font-size="10">Masked Multi-Head Self-Attention</text>
    <rect x="100" y="40" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="58" text-anchor="middle" fill="#8b7ff0" font-size="10">Multi-Head Cross-Attention</text>
    <rect x="100" y="10" width="260" height="26" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
    <text x="230" y="28" text-anchor="middle" fill="#f0b429" font-size="10">Feed-Forward Network</text>
    <line x1="72" y1="53" x2="98" y2="53" stroke="#8b7ff0" stroke-width="1" marker-end="url(#ah-p)"/>
  </g>

  <g transform="translate(0, 355)">
    <rect x="85" y="0" width="290" height="105" rx="8" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.4"/>
    <text x="93" y="16" fill="#f0b429" font-size="10" font-weight="700" class="mono">Layer 4</text>
    <rect x="100" y="70" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="88" text-anchor="middle" fill="#8b7ff0" font-size="10">Masked Multi-Head Self-Attention</text>
    <rect x="100" y="40" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="58" text-anchor="middle" fill="#8b7ff0" font-size="10">Multi-Head Cross-Attention</text>
    <rect x="100" y="10" width="260" height="26" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
    <text x="230" y="28" text-anchor="middle" fill="#f0b429" font-size="10">Feed-Forward Network</text>
    <line x1="72" y1="53" x2="98" y2="53" stroke="#8b7ff0" stroke-width="1" marker-end="url(#ah-p)"/>
  </g>

  <g transform="translate(0, 245)">
    <rect x="85" y="0" width="290" height="105" rx="8" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.4"/>
    <text x="93" y="16" fill="#f0b429" font-size="10" font-weight="700" class="mono">Layer 5</text>
    <rect x="100" y="70" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="88" text-anchor="middle" fill="#8b7ff0" font-size="10">Masked Multi-Head Self-Attention</text>
    <rect x="100" y="40" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="58" text-anchor="middle" fill="#8b7ff0" font-size="10">Multi-Head Cross-Attention</text>
    <rect x="100" y="10" width="260" height="26" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
    <text x="230" y="28" text-anchor="middle" fill="#f0b429" font-size="10">Feed-Forward Network</text>
    <line x1="72" y1="53" x2="98" y2="53" stroke="#8b7ff0" stroke-width="1" marker-end="url(#ah-p)"/>
  </g>

  <g transform="translate(0, 135)">
    <rect x="85" y="0" width="290" height="105" rx="8" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.4"/>
    <text x="93" y="16" fill="#f0b429" font-size="10" font-weight="700" class="mono">Layer 6</text>
    <rect x="100" y="70" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="88" text-anchor="middle" fill="#8b7ff0" font-size="10">Masked Multi-Head Self-Attention</text>
    <rect x="100" y="40" width="260" height="26" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
    <text x="230" y="58" text-anchor="middle" fill="#8b7ff0" font-size="10">Multi-Head Cross-Attention</text>
    <rect x="100" y="10" width="260" height="26" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
    <text x="230" y="28" text-anchor="middle" fill="#f0b429" font-size="10">Feed-Forward Network</text>
    <line x1="72" y1="53" x2="98" y2="53" stroke="#8b7ff0" stroke-width="1" marker-end="url(#ah-p)"/>
  </g>

  <!-- Inter-layer arrows -->
  <line x1="230" y1="685" x2="230" y2="682" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="230" y1="575" x2="230" y2="572" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="230" y1="465" x2="230" y2="462" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="230" y1="355" x2="230" y2="352" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="230" y1="245" x2="230" y2="242" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Linear + Softmax on top -->
  <rect x="155" y="90" width="150" height="28" rx="6" fill="#1e2028" stroke="#4fa8e8" stroke-width="1.2"/>
  <text x="230" y="109" text-anchor="middle" fill="#4fa8e8" font-size="11" font-weight="500">Linear</text>

  <rect x="155" y="50" width="150" height="28" rx="6" fill="#1e2028" stroke="#f0b429" stroke-width="1.2"/>
  <text x="230" y="69" text-anchor="middle" fill="#f0b429" font-size="11" font-weight="500">Softmax</text>

  <line x1="230" y1="135" x2="230" y2="120" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="230" y1="90" x2="230" y2="80" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Output label -->
  <text x="230" y="40" text-anchor="middle" fill="#3ecfa0" font-size="12" font-weight="600">出力確率</text>
</svg>
</div>
</body>
</html>
