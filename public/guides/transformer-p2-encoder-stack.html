<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encoder 6層スタック構造</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --bg2: #161820;
    --bg3: #1e2028;
    --text: #e8e6de;
    --text2: #9e9b91;
    --purple: #8b7ff0;
    --teal: #3ecfa0;
    --amber: #f0b429;
    --blue: #4fa8e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    margin: 0; padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
  }
  h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
  .subtitle {
    font-size: 0.85rem; color: var(--text2);
    margin-bottom: 16px; line-height: 1.6;
  }
  .diagram-wrap {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
  }
  svg text { font-family: 'Noto Sans JP', sans-serif; }
  svg .mono { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<h2>Encoder 6層のスタック構造</h2>
<p class="subtitle">同一構造の層が6つ積み重なり、各層は Multi-Head Self-Attention と Feed-Forward Network の2つのサブレイヤーで構成されます。</p>

<div class="diagram-wrap">
<svg viewBox="0 0 400 720" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
  <defs>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#9e9b91"/>
    </marker>
  </defs>

  <!-- Input Embedding + Positional Encoding -->
  <rect x="100" y="670" width="200" height="30" rx="6" fill="#1e2028" stroke="#4fa8e8" stroke-width="1.2"/>
  <text x="200" y="690" text-anchor="middle" fill="#4fa8e8" font-size="11" font-weight="500">入力埋め込み</text>

  <rect x="100" y="626" width="200" height="30" rx="6" fill="#1e2028" stroke="#f0b429" stroke-width="1.2"/>
  <text x="200" y="646" text-anchor="middle" fill="#f0b429" font-size="11" font-weight="500">位置エンコーディング</text>

  <line x1="200" y1="670" x2="200" y2="658" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>

  <!-- 6 Encoder Layers -->
  <g id="encoder-layers">
    <!-- Layer template: y positions calculated from bottom up -->
    <!-- Each layer: height ~80, gap 10 -->
    <!-- Layer 1 (bottom): y=530 -->
    <!-- Layer 6 (top): y=80 -->

    <!-- Arrow from pos enc to layer 1 -->
    <line x1="200" y1="626" x2="200" y2="618" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>

    <!-- Generate 6 layers -->
    <g id="layer1" transform="translate(0, 530)">
      <rect x="60" y="0" width="280" height="80" rx="8" fill="none" stroke="#8b7ff0" stroke-width="1" opacity="0.4"/>
      <text x="68" y="16" fill="#8b7ff0" font-size="10" font-weight="700" class="mono">Layer 1</text>
      <rect x="80" y="42" width="240" height="28" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
      <text x="200" y="61" text-anchor="middle" fill="#8b7ff0" font-size="10.5">Multi-Head Self-Attention</text>
      <rect x="80" y="10" width="240" height="28" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
      <text x="200" y="29" text-anchor="middle" fill="#f0b429" font-size="10.5">Feed-Forward Network</text>
    </g>

    <g id="layer2" transform="translate(0, 440)">
      <rect x="60" y="0" width="280" height="80" rx="8" fill="none" stroke="#8b7ff0" stroke-width="1" opacity="0.4"/>
      <text x="68" y="16" fill="#8b7ff0" font-size="10" font-weight="700" class="mono">Layer 2</text>
      <rect x="80" y="42" width="240" height="28" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
      <text x="200" y="61" text-anchor="middle" fill="#8b7ff0" font-size="10.5">Multi-Head Self-Attention</text>
      <rect x="80" y="10" width="240" height="28" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
      <text x="200" y="29" text-anchor="middle" fill="#f0b429" font-size="10.5">Feed-Forward Network</text>
    </g>

    <g id="layer3" transform="translate(0, 350)">
      <rect x="60" y="0" width="280" height="80" rx="8" fill="none" stroke="#8b7ff0" stroke-width="1" opacity="0.4"/>
      <text x="68" y="16" fill="#8b7ff0" font-size="10" font-weight="700" class="mono">Layer 3</text>
      <rect x="80" y="42" width="240" height="28" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
      <text x="200" y="61" text-anchor="middle" fill="#8b7ff0" font-size="10.5">Multi-Head Self-Attention</text>
      <rect x="80" y="10" width="240" height="28" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
      <text x="200" y="29" text-anchor="middle" fill="#f0b429" font-size="10.5">Feed-Forward Network</text>
    </g>

    <g id="layer4" transform="translate(0, 260)">
      <rect x="60" y="0" width="280" height="80" rx="8" fill="none" stroke="#8b7ff0" stroke-width="1" opacity="0.4"/>
      <text x="68" y="16" fill="#8b7ff0" font-size="10" font-weight="700" class="mono">Layer 4</text>
      <rect x="80" y="42" width="240" height="28" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
      <text x="200" y="61" text-anchor="middle" fill="#8b7ff0" font-size="10.5">Multi-Head Self-Attention</text>
      <rect x="80" y="10" width="240" height="28" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
      <text x="200" y="29" text-anchor="middle" fill="#f0b429" font-size="10.5">Feed-Forward Network</text>
    </g>

    <g id="layer5" transform="translate(0, 170)">
      <rect x="60" y="0" width="280" height="80" rx="8" fill="none" stroke="#8b7ff0" stroke-width="1" opacity="0.4"/>
      <text x="68" y="16" fill="#8b7ff0" font-size="10" font-weight="700" class="mono">Layer 5</text>
      <rect x="80" y="42" width="240" height="28" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
      <text x="200" y="61" text-anchor="middle" fill="#8b7ff0" font-size="10.5">Multi-Head Self-Attention</text>
      <rect x="80" y="10" width="240" height="28" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
      <text x="200" y="29" text-anchor="middle" fill="#f0b429" font-size="10.5">Feed-Forward Network</text>
    </g>

    <g id="layer6" transform="translate(0, 80)">
      <rect x="60" y="0" width="280" height="80" rx="8" fill="none" stroke="#8b7ff0" stroke-width="1" opacity="0.4"/>
      <text x="68" y="16" fill="#8b7ff0" font-size="10" font-weight="700" class="mono">Layer 6</text>
      <rect x="80" y="42" width="240" height="28" rx="5" fill="#1e2028" stroke="#8b7ff0" stroke-width="1"/>
      <text x="200" y="61" text-anchor="middle" fill="#8b7ff0" font-size="10.5">Multi-Head Self-Attention</text>
      <rect x="80" y="10" width="240" height="28" rx="5" fill="#1e2028" stroke="#f0b429" stroke-width="1"/>
      <text x="200" y="29" text-anchor="middle" fill="#f0b429" font-size="10.5">Feed-Forward Network</text>
    </g>

    <!-- Inter-layer arrows -->
    <line x1="200" y1="530" x2="200" y2="522" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
    <line x1="200" y1="440" x2="200" y2="432" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
    <line x1="200" y1="350" x2="200" y2="342" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
    <line x1="200" y1="260" x2="200" y2="252" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
    <line x1="200" y1="170" x2="200" y2="162" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  </g>

  <!-- Output arrow -->
  <line x1="200" y1="80" x2="200" y2="60" stroke="#9e9b91" stroke-width="1.2" marker-end="url(#ah)"/>
  <text x="200" y="50" text-anchor="middle" fill="#3ecfa0" font-size="12" font-weight="600">Encoder 出力</text>
  <text x="200" y="38" text-anchor="middle" fill="#9e9b91" font-size="9">→ Decoder の Cross-Attention へ</text>
</svg>
</div>
</body>
</html>
