<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embedding層の重み共有</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11; --bg2: #161820; --bg3: #1e2028;
    --text: #e8e6de; --text2: #9e9b91;
    --purple: #8b7ff0; --teal: #3ecfa0; --amber: #f0b429; --blue: #4fa8e8;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; padding: 24px; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; }
  h1 { font-size: clamp(1rem, 2.5vw, 1.35rem); text-align: center; margin: 0 0 18px; font-weight: 700; }
  .svg-wrap { width: 100%; max-width: 700px; margin: 0 auto; }
  svg { display: block; width: 100%; height: auto; }
  .benefits { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
  .benefit { background: var(--bg2); border: 1px solid #2a2c36; border-radius: 10px; padding: 12px 16px; flex: 1 1 200px; max-width: 300px; min-width: 180px; }
  .benefit-title { font-size: .85rem; font-weight: 700; margin-bottom: 4px; }
  .benefit-title.t1 { color: var(--teal); }
  .benefit-title.t2 { color: var(--blue); }
  .benefit-desc { font-size: .78rem; color: var(--text2); line-height: 1.5; }
</style>
</head>
<body>
<h1>Embedding層の重み共有</h1>

<div class="svg-wrap">
<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="aG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#9e9b91"/></marker>
    <marker id="aA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0b429"/></marker>
  </defs>

  <!-- 中央: 共有重み行列 -->
  <rect x="225" y="140" width="250" height="80" rx="12" fill="#2a2820" stroke="#f0b429" stroke-width="2.5"/>
  <text x="350" y="170" text-anchor="middle" fill="#f0b429" font-family="'Noto Sans JP',sans-serif" font-size="15" font-weight="700">共有重み行列 W</text>
  <text x="350" y="195" text-anchor="middle" fill="#f0b429" font-family="'JetBrains Mono',monospace" font-size="13">d_model × vocab_size</text>
  <text x="350" y="212" text-anchor="middle" fill="#9e9b91" font-family="'JetBrains Mono',monospace" font-size="11">(512 × 37,000)</text>

  <!-- コンポーネント1: Input Embedding（左上） -->
  <rect x="30" y="20" width="190" height="60" rx="10" fill="#1a2030" stroke="#4fa8e8" stroke-width="2"/>
  <text x="125" y="46" text-anchor="middle" fill="#4fa8e8" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700">Input Embedding</text>
  <text x="125" y="66" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">Encoder入力側</text>

  <!-- コンポーネント2: Output Embedding（右上） -->
  <rect x="480" y="20" width="190" height="60" rx="10" fill="#201a30" stroke="#8b7ff0" stroke-width="2"/>
  <text x="575" y="46" text-anchor="middle" fill="#c4b8ff" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700">Output Embedding</text>
  <text x="575" y="66" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">Decoder入力側</text>

  <!-- コンポーネント3: Pre-Softmax Linear（下） -->
  <rect x="200" y="290" width="300" height="60" rx="10" fill="#1a3025" stroke="#3ecfa0" stroke-width="2"/>
  <text x="350" y="316" text-anchor="middle" fill="#3ecfa0" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="700">Pre-Softmax Linear変換</text>
  <text x="350" y="338" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">Decoder出力側（Softmax直前）</text>

  <!-- 接続線: Input Embedding → 共有重み -->
  <path d="M125,80 L125,120 Q125,140 155,155 L225,170" fill="none" stroke="#f0b429" stroke-width="2.5" marker-end="url(#aA)"/>
  <text x="100" y="118" fill="#f0b429" font-family="'JetBrains Mono',monospace" font-size="10" font-weight="500">W</text>

  <!-- 接続線: Output Embedding → 共有重み -->
  <path d="M575,80 L575,120 Q575,140 545,155 L475,170" fill="none" stroke="#f0b429" stroke-width="2.5" marker-end="url(#aA)"/>
  <text x="585" y="118" fill="#f0b429" font-family="'JetBrains Mono',monospace" font-size="10" font-weight="500">W</text>

  <!-- 接続線: Pre-Softmax → 共有重み -->
  <path d="M350,290 L350,220" fill="none" stroke="#f0b429" stroke-width="2.5" marker-end="url(#aA)"/>
  <text x="365" y="260" fill="#f0b429" font-family="'JetBrains Mono',monospace" font-size="10" font-weight="500">W&#x1D40;</text>
  <text x="365" y="275" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="9">（転置）</text>

  <!-- 処理の流れ（薄い補助矢印） -->
  <!-- Encoder側 -->
  <text x="30" y="106" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">トークンID</text>
  <text x="30" y="120" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">→ ベクトル(512次元)</text>

  <!-- Decoder側 -->
  <text x="520" y="106" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">トークンID</text>
  <text x="520" y="120" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">→ ベクトル(512次元)</text>

  <!-- Pre-Softmax側 -->
  <text x="520" y="310" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">ベクトル(512次元)</text>
  <text x="520" y="324" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="10">→ 語彙確率分布</text>

  <!-- 三角の「同一」マーク -->
  <text x="350" y="130" text-anchor="middle" fill="#f0b429" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="700">3つのコンポーネントが同じ重みを共有</text>

  <!-- 補足: スケーリング -->
  <rect x="30" y="365" width="640" height="28" rx="6" fill="#1e2028" stroke="#2a2c36" stroke-width="1"/>
  <text x="350" y="384" text-anchor="middle" fill="#9e9b91" font-family="'Noto Sans JP',sans-serif" font-size="11">※ Embedding層では重みに √d_model (= √512 ≈ 22.6) を掛けてスケーリングする</text>
</svg>
</div>

<div class="benefits">
  <div class="benefit">
    <div class="benefit-title t1">パラメータ数の削減</div>
    <div class="benefit-desc">3つの巨大な行列（512×37,000）を1つに統合。約3800万パラメータの重複を排除し、メモリ効率を大幅に改善。</div>
  </div>
  <div class="benefit">
    <div class="benefit-title t2">学習の安定化</div>
    <div class="benefit-desc">入力空間と出力空間で同じ表現を学習するため、意味的に近い単語は入力時も出力時も近いベクトルにマップされ、学習が安定する。</div>
  </div>
</div>
</body>
</html>
