<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decoderのマスク行列（Causal Mask）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --bg2: #161820;
    --bg3: #1e2028;
    --text: #e8e6de;
    --text2: #9e9b91;
    --purple: #8b7ff0;
    --teal: #3ecfa0;
    --amber: #f0b429;
    --blue: #4fa8e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    margin: 0; padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
  }
  h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
  .subtitle {
    font-size: 0.85rem; color: var(--text2);
    margin-bottom: 20px; line-height: 1.6;
  }
  .container {
    max-width: 560px;
    margin: 0 auto;
  }

  .matrix-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .col-labels {
    display: grid;
    grid-template-columns: 80px repeat(5, 1fr);
    gap: 3px;
    width: 100%;
    max-width: 480px;
  }
  .col-labels span {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text2);
    padding: 4px 0;
  }
  .col-labels span:first-child { visibility: hidden; }
  .col-labels span.active-col {
    color: var(--teal);
    font-weight: 700;
  }

  .matrix-row {
    display: grid;
    grid-template-columns: 80px repeat(5, 1fr);
    gap: 3px;
    width: 100%;
    max-width: 480px;
  }
  .row-label {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text2);
    white-space: nowrap;
  }
  .row-label.active-row {
    color: var(--amber);
    font-weight: 700;
  }
  .row-label.generating {
    color: var(--purple);
    font-weight: 700;
  }

  .cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    border-radius: 6px;
    transition: all 0.4s ease;
    position: relative;
    min-height: 56px;
  }

  .cell.allowed {
    background: rgba(62, 207, 160, 0.15);
    color: var(--teal);
    border: 1px solid rgba(62, 207, 160, 0.3);
  }
  .cell.masked {
    background: rgba(220, 50, 50, 0.1);
    color: rgba(220, 80, 80, 0.5);
    border: 1px solid rgba(220, 50, 50, 0.15);
  }
  .cell.dimmed {
    opacity: 0.2;
  }
  .cell.highlight-allowed {
    background: rgba(62, 207, 160, 0.35);
    color: var(--teal);
    border: 1px solid rgba(62, 207, 160, 0.6);
    box-shadow: 0 0 12px rgba(62, 207, 160, 0.2);
  }
  .cell.highlight-masked {
    background: rgba(220, 50, 50, 0.25);
    color: rgba(220, 80, 80, 0.8);
    border: 1px solid rgba(220, 50, 50, 0.4);
  }
  .cell.current-pos {
    outline: 2px solid var(--purple);
    outline-offset: -2px;
    box-shadow: 0 0 16px rgba(139, 127, 240, 0.3);
  }
  .cell.current-pos::after {
    content: '▶';
    position: absolute;
    top: 2px;
    right: 4px;
    font-size: 0.55rem;
    color: var(--purple);
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    transition: background 0.2s;
  }
  button:hover { background: rgba(139, 127, 240, 0.2); border-color: var(--purple); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  .step-info {
    font-size: 0.85rem;
    color: var(--text2);
    min-width: 160px;
    text-align: center;
  }
  .step-info .token-name {
    color: var(--purple);
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  .legend {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--text2);
  }
  .legend-swatch {
    width: 16px; height: 16px;
    border-radius: 3px;
  }
  .swatch-allowed { background: rgba(62, 207, 160, 0.3); border: 1px solid rgba(62, 207, 160, 0.5); }
  .swatch-masked { background: rgba(220, 50, 50, 0.15); border: 1px solid rgba(220, 50, 50, 0.3); }
  .swatch-current { background: var(--bg3); border: 2px solid var(--purple); }

  @media (max-width: 500px) {
    .col-labels, .matrix-row { max-width: 100%; }
    .col-labels span, .row-label { font-size: 0.65rem; }
    .cell { font-size: 0.7rem; min-height: 44px; }
    .col-labels { grid-template-columns: 60px repeat(5, 1fr); }
    .matrix-row { grid-template-columns: 60px repeat(5, 1fr); }
  }
</style>
</head>
<body>
<div class="container">
  <h2>Decoderのマスク行列（Causal Mask）</h2>
  <p class="subtitle">下三角行列で「未来のトークン」へのAttentionをブロックし、自己回帰生成を実現する</p>

  <div class="matrix-area" id="matrixArea"></div>

  <div class="controls">
    <button id="btnPrev" disabled>← 前へ</button>
    <div class="step-info" id="stepInfo">全体表示</div>
    <button id="btnNext">次のステップ →</button>
  </div>
  <div class="controls" style="margin-top:8px;">
    <button id="btnReset">リセット</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch swatch-allowed"></div>0（参照可能）</div>
    <div class="legend-item"><div class="legend-swatch swatch-masked"></div>-∞（マスク）</div>
    <div class="legend-item"><div class="legend-swatch swatch-current"></div>現在位置</div>
  </div>
</div>

<script>
const tokens = ['&lt;SOS&gt;', 'I', 'am', 'a', 'cat'];
const N = tokens.length;
let step = -1; // -1 = overview

function buildMatrix() {
  const area = document.getElementById('matrixArea');
  area.innerHTML = '';

  // Column labels (Key)
  const colRow = document.createElement('div');
  colRow.className = 'col-labels';
  const emptyLabel = document.createElement('span');
  emptyLabel.textContent = '';
  colRow.appendChild(emptyLabel);
  tokens.forEach((t, ci) => {
    const sp = document.createElement('span');
    sp.textContent = t.replace('&lt;', '<').replace('&gt;', '>');
    sp.id = 'col-' + ci;
    colRow.appendChild(sp);
  });
  area.appendChild(colRow);

  // Rows (Query)
  for (let r = 0; r < N; r++) {
    const row = document.createElement('div');
    row.className = 'matrix-row';

    const label = document.createElement('div');
    label.className = 'row-label';
    label.id = 'row-' + r;
    label.textContent = tokens[r].replace('&lt;', '<').replace('&gt;', '>');
    row.appendChild(label);

    for (let c = 0; c < N; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${r}-${c}`;
      const isAllowed = c <= r;
      cell.classList.add(isAllowed ? 'allowed' : 'masked');
      cell.textContent = isAllowed ? '0' : '-∞';
      row.appendChild(cell);
    }
    area.appendChild(row);
  }

  updateDisplay();
}

function updateDisplay() {
  const info = document.getElementById('stepInfo');
  document.getElementById('btnPrev').disabled = step <= -1;
  document.getElementById('btnNext').disabled = step >= N - 1;

  // Reset all styles
  for (let r = 0; r < N; r++) {
    const rowLabel = document.getElementById('row-' + r);
    rowLabel.className = 'row-label';
    document.getElementById('col-' + r).className = '';
    for (let c = 0; c < N; c++) {
      const cell = document.getElementById(`cell-${r}-${c}`);
      const isAllowed = c <= r;
      cell.className = 'cell ' + (isAllowed ? 'allowed' : 'masked');
    }
  }

  if (step === -1) {
    info.innerHTML = '全体表示';
    return;
  }

  const currentToken = tokens[step].replace('&lt;', '<').replace('&gt;', '>');
  info.innerHTML = `ステップ ${step + 1}/${N}: <span class="token-name">${currentToken}</span> を生成中`;

  // Dim all cells not in current row
  for (let r = 0; r < N; r++) {
    const rowLabel = document.getElementById('row-' + r);
    for (let c = 0; c < N; c++) {
      const cell = document.getElementById(`cell-${r}-${c}`);
      const isAllowed = c <= r;
      if (r !== step) {
        cell.classList.add('dimmed');
      } else {
        // Current row - highlight
        if (isAllowed) {
          cell.className = 'cell highlight-allowed';
        } else {
          cell.className = 'cell highlight-masked';
        }
        if (c === r) {
          cell.classList.add('current-pos');
        }
      }
    }
    if (r === step) {
      rowLabel.classList.add('generating');
    } else {
      rowLabel.style.opacity = '0.3';
    }
  }

  // Highlight active columns
  for (let c = 0; c < N; c++) {
    const colLabel = document.getElementById('col-' + c);
    if (c <= step) {
      colLabel.classList.add('active-col');
    } else {
      colLabel.style.opacity = '0.3';
    }
  }
}

document.getElementById('btnNext').addEventListener('click', () => {
  if (step < N - 1) { step++; updateDisplay(); }
});
document.getElementById('btnPrev').addEventListener('click', () => {
  if (step > -1) {
    step--;
    // Reset opacity
    for (let r = 0; r < N; r++) {
      document.getElementById('row-' + r).style.opacity = '';
      document.getElementById('col-' + r).style.opacity = '';
    }
    updateDisplay();
  }
});
document.getElementById('btnReset').addEventListener('click', () => {
  step = -1;
  for (let r = 0; r < N; r++) {
    document.getElementById('row-' + r).style.opacity = '';
    document.getElementById('col-' + r).style.opacity = '';
  }
  updateDisplay();
});

buildMatrix();
</script>
</body>
</html>
