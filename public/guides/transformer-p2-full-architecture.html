<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformer 全体アーキテクチャ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --bg2: #161820;
    --bg3: #1e2028;
    --text: #e8e6de;
    --text2: #9e9b91;
    --purple: #8b7ff0;
    --teal: #3ecfa0;
    --amber: #f0b429;
    --blue: #4fa8e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    margin: 0; padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
  }
  h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
  .subtitle {
    font-size: 0.85rem; color: var(--text2);
    margin-bottom: 16px; line-height: 1.6;
  }
  .diagram-wrap {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
  }
  svg text {
    font-family: 'Noto Sans JP', sans-serif;
  }
  svg .mono {
    font-family: 'JetBrains Mono', monospace;
  }

  /* Overlay */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(14,15,17,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .overlay.active { display: flex; }
  .overlay-card {
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 12px;
    padding: 28px 32px;
    max-width: 480px;
    width: 90%;
    position: relative;
  }
  .overlay-card h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--purple);
  }
  .overlay-card p {
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--text);
  }
  .overlay-close {
    position: absolute;
    top: 12px; right: 16px;
    background: none; border: none;
    color: var(--text2); font-size: 1.3rem;
    cursor: pointer;
  }

  /* clickable blocks */
  .clickable { cursor: pointer; }
  .clickable:hover rect,
  .clickable:hover path { filter: brightness(1.3); }
</style>
</head>
<body>
<h2>Transformer の全体アーキテクチャ</h2>
<p class="subtitle">論文 "Attention Is All You Need" Figure 1 の再現。各ブロックをクリックすると説明が表示されます。</p>

<div class="diagram-wrap">
<svg viewBox="0 0 700 680" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9e9b91"/>
    </marker>
    <marker id="ah-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b7ff0"/>
    </marker>
  </defs>

  <!-- ========== ENCODER SIDE (left) ========== -->
  <!-- Title -->
  <text x="190" y="28" text-anchor="middle" fill="#8b7ff0" font-size="15" font-weight="700">Encoder</text>
  <text x="190" y="46" text-anchor="middle" fill="#9e9b91" font-size="11" class="mono">N = 6</text>

  <!-- Encoder stack bounding box -->
  <rect x="70" y="180" width="240" height="310" rx="10" fill="none" stroke="#8b7ff0" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Input Embedding -->
  <g class="clickable" data-info="input-embed" onclick="showInfo(this)">
    <rect x="110" y="590" width="160" height="34" rx="6" fill="#1e2028" stroke="#4fa8e8" stroke-width="1.2"/>
    <text x="190" y="612" text-anchor="middle" fill="#4fa8e8" font-size="12" font-weight="500">入力埋め込み</text>
  </g>

  <!-- Positional Encoding (encoder) -->
  <g class="clickable" data-info="pos-enc" onclick="showInfo(this)">
    <rect x="110" y="540" width="160" height="34" rx="6" fill="#1e2028" stroke="#f0b429" stroke-width="1.2"/>
    <text x="190" y="562" text-anchor="middle" fill="#f0b429" font-size="12" font-weight="500">位置エンコーディング</text>
  </g>

  <!-- Inputs label -->
  <text x="190" y="650" text-anchor="middle" fill="#9e9b91" font-size="12">入力 (Inputs)</text>
  <!-- Arrow: Inputs -> Input Embed -->
  <line x1="190" y1="636" x2="190" y2="626" stroke="#9e9b91" stroke-width="1.2" marker-end="url(#ah)"/>
  <!-- Arrow: Input Embed -> Pos Enc -->
  <line x1="190" y1="590" x2="190" y2="576" stroke="#9e9b91" stroke-width="1.2" marker-end="url(#ah)"/>
  <!-- Arrow: Pos Enc -> Encoder stack -->
  <line x1="190" y1="540" x2="190" y2="494" stroke="#9e9b91" stroke-width="1.2" marker-end="url(#ah)"/>

  <!-- Encoder: Multi-Head Self-Attention -->
  <g class="clickable" data-info="mha" onclick="showInfo(this)">
    <rect x="100" y="430" width="180" height="40" rx="6" fill="#1e2028" stroke="#8b7ff0" stroke-width="1.2"/>
    <text x="190" y="455" text-anchor="middle" fill="#8b7ff0" font-size="11.5" font-weight="500">Multi-Head Attention</text>
  </g>

  <!-- Encoder: Add & Norm 1 -->
  <g class="clickable" data-info="addnorm" onclick="showInfo(this)">
    <rect x="115" y="380" width="150" height="34" rx="6" fill="#1e2028" stroke="#3ecfa0" stroke-width="1.2"/>
    <text x="190" y="402" text-anchor="middle" fill="#3ecfa0" font-size="11.5" font-weight="500">Add &amp; Norm</text>
  </g>

  <!-- Encoder: Feed Forward -->
  <g class="clickable" data-info="ffn" onclick="showInfo(this)">
    <rect x="100" y="310" width="180" height="40" rx="6" fill="#1e2028" stroke="#f0b429" stroke-width="1.2"/>
    <text x="190" y="335" text-anchor="middle" fill="#f0b429" font-size="11.5" font-weight="500">Feed Forward</text>
  </g>

  <!-- Encoder: Add & Norm 2 -->
  <g class="clickable" data-info="addnorm" onclick="showInfo(this)">
    <rect x="115" y="260" width="150" height="34" rx="6" fill="#1e2028" stroke="#3ecfa0" stroke-width="1.2"/>
    <text x="190" y="282" text-anchor="middle" fill="#3ecfa0" font-size="11.5" font-weight="500">Add &amp; Norm</text>
  </g>

  <!-- Encoder internal arrows -->
  <line x1="190" y1="470" x2="190" y2="416" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="190" y1="380" x2="190" y2="352" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="190" y1="310" x2="190" y2="296" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Encoder residual arrows (skip connections) -->
  <path d="M96,490 L70,490 L70,397 L113,397" fill="none" stroke="#3ecfa0" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ah-purple)" opacity="0.6"/>
  <path d="M96,370 L70,370 L70,277 L113,277" fill="none" stroke="#3ecfa0" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ah-purple)" opacity="0.6"/>

  <!-- Encoder output arrow -->
  <line x1="190" y1="260" x2="190" y2="195" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <text x="190" y="188" text-anchor="middle" fill="#9e9b91" font-size="10">Encoder 出力</text>

  <!-- ========== DECODER SIDE (right) ========== -->
  <text x="510" y="28" text-anchor="middle" fill="#f0b429" font-size="15" font-weight="700">Decoder</text>
  <text x="510" y="46" text-anchor="middle" fill="#9e9b91" font-size="11" class="mono">N = 6</text>

  <!-- Decoder stack bounding box -->
  <rect x="390" y="130" width="240" height="410" rx="10" fill="none" stroke="#f0b429" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Output Embedding -->
  <g class="clickable" data-info="output-embed" onclick="showInfo(this)">
    <rect x="430" y="590" width="160" height="34" rx="6" fill="#1e2028" stroke="#4fa8e8" stroke-width="1.2"/>
    <text x="510" y="612" text-anchor="middle" fill="#4fa8e8" font-size="12" font-weight="500">出力埋め込み</text>
  </g>

  <!-- Positional Encoding (decoder) -->
  <g class="clickable" data-info="pos-enc" onclick="showInfo(this)">
    <rect x="430" y="540" width="160" height="34" rx="6" fill="#1e2028" stroke="#f0b429" stroke-width="1.2"/>
    <text x="510" y="562" text-anchor="middle" fill="#f0b429" font-size="12" font-weight="500">位置エンコーディング</text>
  </g>

  <!-- Outputs (shifted right) label -->
  <text x="510" y="650" text-anchor="middle" fill="#9e9b91" font-size="12">出力（右シフト）</text>
  <line x1="510" y1="636" x2="510" y2="626" stroke="#9e9b91" stroke-width="1.2" marker-end="url(#ah)"/>
  <line x1="510" y1="590" x2="510" y2="576" stroke="#9e9b91" stroke-width="1.2" marker-end="url(#ah)"/>
  <line x1="510" y1="540" x2="510" y2="500" stroke="#9e9b91" stroke-width="1.2" marker-end="url(#ah)"/>

  <!-- Decoder: Masked Multi-Head Attention -->
  <g class="clickable" data-info="masked-mha" onclick="showInfo(this)">
    <rect x="410" y="460" width="200" height="40" rx="6" fill="#1e2028" stroke="#8b7ff0" stroke-width="1.2"/>
    <text x="510" y="485" text-anchor="middle" fill="#8b7ff0" font-size="11" font-weight="500">Masked Multi-Head Attention</text>
  </g>

  <!-- Decoder: Add & Norm 1 -->
  <g class="clickable" data-info="addnorm" onclick="showInfo(this)">
    <rect x="435" y="410" width="150" height="34" rx="6" fill="#1e2028" stroke="#3ecfa0" stroke-width="1.2"/>
    <text x="510" y="432" text-anchor="middle" fill="#3ecfa0" font-size="11.5" font-weight="500">Add &amp; Norm</text>
  </g>

  <!-- Decoder: Multi-Head Cross-Attention -->
  <g class="clickable" data-info="cross-attn" onclick="showInfo(this)">
    <rect x="410" y="350" width="200" height="40" rx="6" fill="#1e2028" stroke="#8b7ff0" stroke-width="1.2"/>
    <text x="510" y="375" text-anchor="middle" fill="#8b7ff0" font-size="11" font-weight="500">Multi-Head Attention</text>
    <text x="510" y="345" text-anchor="middle" fill="#9e9b91" font-size="9">(Cross-Attention)</text>
  </g>

  <!-- Decoder: Add & Norm 2 -->
  <g class="clickable" data-info="addnorm" onclick="showInfo(this)">
    <rect x="435" y="300" width="150" height="34" rx="6" fill="#1e2028" stroke="#3ecfa0" stroke-width="1.2"/>
    <text x="510" y="322" text-anchor="middle" fill="#3ecfa0" font-size="11.5" font-weight="500">Add &amp; Norm</text>
  </g>

  <!-- Decoder: Feed Forward -->
  <g class="clickable" data-info="ffn" onclick="showInfo(this)">
    <rect x="420" y="240" width="180" height="40" rx="6" fill="#1e2028" stroke="#f0b429" stroke-width="1.2"/>
    <text x="510" y="265" text-anchor="middle" fill="#f0b429" font-size="11.5" font-weight="500">Feed Forward</text>
  </g>

  <!-- Decoder: Add & Norm 3 -->
  <g class="clickable" data-info="addnorm" onclick="showInfo(this)">
    <rect x="435" y="190" width="150" height="34" rx="6" fill="#1e2028" stroke="#3ecfa0" stroke-width="1.2"/>
    <text x="510" y="212" text-anchor="middle" fill="#3ecfa0" font-size="11.5" font-weight="500">Add &amp; Norm</text>
  </g>

  <!-- Decoder internal arrows -->
  <line x1="510" y1="500" x2="510" y2="446" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="510" y1="410" x2="510" y2="392" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="510" y1="350" x2="510" y2="336" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="510" y1="300" x2="510" y2="282" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="510" y1="240" x2="510" y2="226" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Decoder residual skip connections -->
  <path d="M406,490 L386,490 L386,427 L433,427" fill="none" stroke="#3ecfa0" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M406,400 L386,400 L386,317 L433,317" fill="none" stroke="#3ecfa0" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M416,270 L386,270 L386,207 L433,207" fill="none" stroke="#3ecfa0" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Encoder -> Decoder cross-attention arrow -->
  <path d="M310,190 L360,190 L360,370 L408,370" fill="none" stroke="#8b7ff0" stroke-width="1.8" marker-end="url(#ah-purple)"/>
  <text x="340" y="280" fill="#8b7ff0" font-size="9" text-anchor="middle" transform="rotate(-90,340,280)">K, V</text>

  <!-- Linear layer -->
  <g class="clickable" data-info="linear" onclick="showInfo(this)">
    <rect x="445" y="100" width="130" height="34" rx="6" fill="#1e2028" stroke="#4fa8e8" stroke-width="1.2"/>
    <text x="510" y="122" text-anchor="middle" fill="#4fa8e8" font-size="12" font-weight="500">Linear</text>
  </g>

  <!-- Softmax -->
  <g class="clickable" data-info="softmax" onclick="showInfo(this)">
    <rect x="445" y="56" width="130" height="34" rx="6" fill="#1e2028" stroke="#f0b429" stroke-width="1.2"/>
    <text x="510" y="78" text-anchor="middle" fill="#f0b429" font-size="12" font-weight="500">Softmax</text>
  </g>

  <line x1="510" y1="190" x2="510" y2="136" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>
  <line x1="510" y1="100" x2="510" y2="92" stroke="#9e9b91" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Output Probabilities -->
  <text x="510" y="48" text-anchor="middle" fill="#e8e6de" font-size="12" font-weight="600">出力確率</text>
</svg>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="hideInfo(event)">
  <div class="overlay-card" onclick="event.stopPropagation()">
    <button class="overlay-close" onclick="hideInfo(event)">&times;</button>
    <h3 id="overlay-title"></h3>
    <p id="overlay-body"></p>
  </div>
</div>

<script>
const infoData = {
  'input-embed': {
    title: '入力埋め込み (Input Embedding)',
    body: '入力トークン（単語や文字）を固定次元のベクトルに変換します。論文では d_model = 512 次元の埋め込みを使用しています。重みは sqrt(d_model) でスケーリングされます。'
  },
  'output-embed': {
    title: '出力埋め込み (Output Embedding)',
    body: 'デコーダ側の入力トークン（前のステップまでの出力）を固定次元ベクトルに変換します。入力埋め込みと重みを共有することも可能です。'
  },
  'pos-enc': {
    title: '位置エンコーディング (Positional Encoding)',
    body: 'トークンの位置情報をベクトルに加算します。Transformerには再帰構造がないため、sin/cos関数による位置エンコーディングで語順を表現します。偶数次元にsin、奇数次元にcosを使用します。'
  },
  'mha': {
    title: 'Multi-Head Self-Attention',
    body: '入力の各位置が他のすべての位置に注目（Attention）します。Query, Key, Value の3つの線形射影を行い、h=8個のヘッドで並列にAttentionを計算します。異なるヘッドが異なる種類の関係性を捉えます。'
  },
  'masked-mha': {
    title: 'Masked Multi-Head Self-Attention',
    body: 'Self-Attentionと同じ構造ですが、未来の位置への注目をマスク（-inf）で遮断します。これにより、位置 i の予測は位置 i より前の出力のみに依存し、自己回帰的な生成が可能になります。'
  },
  'cross-attn': {
    title: 'Multi-Head Cross-Attention',
    body: 'デコーダからの Query と、エンコーダ出力からの Key, Value を使ったAttentionです。デコーダの各位置がエンコーダの全位置を参照でき、入力文の情報を出力生成に活用します。'
  },
  'addnorm': {
    title: 'Add & Norm（残差接続 + 層正規化）',
    body: 'サブレイヤーの入力と出力を加算（残差接続）し、Layer Normalization を適用します。式: LayerNorm(x + Sublayer(x))。残差接続により勾配の流れが改善され、深いネットワークの学習が安定します。'
  },
  'ffn': {
    title: 'Position-wise Feed-Forward Network',
    body: '各位置に独立に適用される2層の全結合ネットワークです。FFN(x) = max(0, xW₁ + b₁)W₂ + b₂。内部次元は d_ff = 2048 で、ReLU活性化関数を使用します。'
  },
  'linear': {
    title: 'Linear（線形変換）',
    body: 'デコーダ出力を語彙サイズの次元に射影する全結合層です。出力は各トークンに対するスコア（logits）となります。'
  },
  'softmax': {
    title: 'Softmax',
    body: 'Linear層の出力を確率分布に変換します。各トークンの生成確率を0〜1の範囲で出力し、合計が1になります。最も確率の高いトークンが次の出力として選択されます。'
  }
};

function showInfo(el) {
  const key = el.getAttribute('data-info');
  const info = infoData[key];
  if (!info) return;
  document.getElementById('overlay-title').textContent = info.title;
  document.getElementById('overlay-body').textContent = info.body;
  document.getElementById('overlay').classList.add('active');
}

function hideInfo(e) {
  document.getElementById('overlay').classList.remove('active');
}
</script>
</body>
</html>
